<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="../../main.js" type="module" defer></script>
    <script src="https://kit.fontawesome.com/6747f39511.js" crossorigin="anonymous"></script>
    <title>Vite App</title>
  </head>
  <body class=" w-full min-h-dvh bg-secondary dark:bg-dark-secondary dark:text-white text-black">

    <nav class="w-full p4 flex justify-between p-4 bg-primary dark:bg-dark-primary text-md font-semibold">
        <span>ProjectName</span>
        <ul class="gap-3 hidden md:flex">
            <li class="bg-secondary rounded-xl px-3 py-2">
                <a href="/">Home</a>
            </li>
            <li class="bg-secondary rounded-xl px-3 py-2">
                <a href="/auth/login/index.html">Login</a>
            </li>
            <li class="bg-secondary rounded-xl px-3 py-2">
                <a href="/auth/register/index.html">Register</a>
            </li>
            <li class="bg-secondary rounded-xl px-3 py-2">
                <a href="/profile/index.html">Profile</a>
            </li>
        </ul>
        <button class="md:hidden">
            <i class="fa-solid fa-bars fa-xl"></i>            
        </button>

    </nav>
    <main class="w-full h-full grid-cols-1">
        <div class="max-w-md mx-auto mt-10 p-6 bg-white shadow-md rounded-lg">
            <h1 class="text-2xl font-semibold mb-4">Login</h1>
            <form action="/auth/login" method="POST" class="space-y-4">
              <div>
                <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="email" name="email" required
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
              </div>
              <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="password" name="password" required
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
              </div>
              <button type="submit"
                      class="w-full bg-indigo-600 text-white py-2 px-4 rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                Login
              </button>
            </form>
            <p class="mt-4 text-center text-sm text-gray-600">
              Don’t have an account?
              <a href="/auth/register/index.html" class="text-indigo-600 hover:underline">Register here</a>
            </p>
          </div>
          

    </main>
  </body>
</html>
